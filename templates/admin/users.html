{% extends "base.html" %}
{% block content %}
  <div class="card">
    <h2>Users</h2>
    <form method="post" action="/admin/users/create" class="card" style="max-width: 720px;">
      <h3>Create user</h3>
      <div class="row">
        <div>
          <label>Username</label>
          <input type="text" name="username" required />
        </div>
        <div>
          <label>Temporary password</label>
          <input type="password" name="password" required />
        </div>
      </div>
      <div style="margin-top: 10px;">
        <label><input type="checkbox" name="is_admin" value="1" /> Admin</label>
      </div>
      <div style="margin-top: 10px;">
        <button type="submit">Create</button>
      </div>
    </form>

    <table>
      <thead>
        <tr><th>Username</th><th>Admin</th><th>Created</th></tr>
      </thead>
      <tbody>
        {% for u in users %}
          <tr>
            <td>{{ u.username|e }}</td>
            <td>{% if u.is_admin %}<span class="pill pill-ok">yes</span>{% else %}<span class="pill">no</span>{% endif %}</td>
            <td class="muted">{{ u.created_at }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
